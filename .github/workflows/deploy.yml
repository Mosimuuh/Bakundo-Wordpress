name: Deploy to Simply

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build bakundo-hero block
        run: |
          cd plugins/bakundo-blocks/bakundo-hero
          npm install
          npm run build

      - name: Deploy theme to Simply
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SIMPLY_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "themes/bakundo-starter-theme/"
          REMOTE_HOST: linux59.unoeuro.com
          REMOTE_USER: bakundo.dk
          TARGET: /var/www/bakundo.dk/gutenberg.test/wp-content/themes/bakundo-starter-theme/

      - name: Deploy plugin to Simply
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SIMPLY_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "plugins/bakundo-blocks/"
          REMOTE_HOST: linux59.unoeuro.com
          REMOTE_USER: bakundo.dk
          TARGET: /var/www/bakundo.dk/gutenberg.test/wp-content/plugins/bakundo-blocks/
          EXCLUDE: ".gitkeep,node_modules"